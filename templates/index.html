<!DOCTYPE html>
<html>
<head>
    <title>Buscador de Autores</title>
</head>
<body>

    <h1>Buscador de Autores</h1>

    <form method="POST">
        <input type="text" name="keywords" placeholder="Ej: liderazgo, innovación">
        <button type="submit">Buscar</button>
    </form>

    <hr>

    {% for autor in resultados %}
        <div>
            <h3>{{ autor["author_name"] }}</h3>
            <p>Puntuación: {{ autor["score"] }}</p>
        </div>
    {% endfor %}

</body>
</html>
