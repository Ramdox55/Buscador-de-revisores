<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Revisores</title>
</head>
<body>

    <h1>Buscador de Revisores</h1>

    <form method="POST">
        <input
            type="text"
            name="keywords"
            placeholder="Ej: liderazgo, innovación"
            style="width:400px"
        >

        <button type="submit">Buscar</button>
    </form>

    <hr>

    {% if resultados %}

        {% for autor in resultados %}

            <div style="margin-bottom:20px;">

                <h3>{{ autor['Columna1'] }}</h3>

                <p>
                    <strong>Palabras clave:</strong>
                    {{ autor['Columna2'] }}
                </p>

                <p>
                    <strong>Puntuación:</strong>
                    {{ autor['match_score'] }}
                </p>

            </div>

        {% endfor %}

    {% endif %}

</body>
</html>
