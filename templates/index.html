<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Revisores</title>
</head>
<body>

    <h1>Buscador de Revisores</h1>

    <form method="POST">
        <input
            type="text"
            name="keywords"
            placeholder="Coloca tus palabras clave separadas por coma. Ej: liderazgo, innovación"
            style="width:400px"
        >

        <button type="submit">Buscar</button>
    </form>

    <hr>

    {% if resultados %}

        {% for autor in resultados %}

            <div style="margin-bottom:25px; border-bottom:1px solid #ccc; padding-bottom:15px;">

                <h3>{{ autor['Columna1'] }}</h3>

                <p>
                    <strong>Correo:</strong>
                    {{ autor['Columna3'] }}
                </p>

                <p>
                    <strong>Palabras clave:</strong>
                    {{ autor['Columna2'] }}
                </p>

                <p>
                    <strong>Coincidencias:</strong>
                    {{ autor['match_score'] }}
                </p>

            </div>

        {% endfor %}

    {% endif %}

</body>
</html>
